stages:
  - test
  - build
  - deploy-staging
  - deploy-prod

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  DOCKER_IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ── Tests ─────────────────────────────────────────────────────────────────────
test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
    - pip install -e .
  script:
    - pytest tests/ -v --tb=short
  cache:
    paths:
      - .pip-cache/
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      junit: test-results.xml
    when: always

# ── Docker build & push ───────────────────────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_IMAGE_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_IMAGE_LATEST
  only:
    - main
    - /^release\/.*/

# ── Staging deploy (SSH) ──────────────────────────────────────────────────────
deploy-staging:
  stage: deploy-staging
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh && echo "$STAGING_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $STAGING_SSH_USER@$STAGING_HOST "
        docker pull $DOCKER_IMAGE &&
        docker stop dataplatform || true &&
        docker rm   dataplatform || true &&
        docker run -d --name dataplatform --restart unless-stopped \
          -p 8000:8000 \
          -e DATAPLATFORM_USERNAME=\$DATAPLATFORM_USERNAME \
          -e DATAPLATFORM_PASSWORD=\$DATAPLATFORM_PASSWORD \
          -e DATAPLATFORM_SESSION_SECRET=\$DATAPLATFORM_SESSION_SECRET \
          -v dp_data:/app/data \
          -v dp_logs:/app/logs \
          -v dp_pipelines:/app/pipelines \
          $DOCKER_IMAGE
      "
  environment:
    name: staging
    url: http://$STAGING_HOST:8000
  only:
    - main

# ── Production deploy (manual gate) ──────────────────────────────────────────
deploy-prod:
  stage: deploy-prod
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$PROD_SSH_KEY" | ssh-add -
    - mkdir -p ~/.ssh && echo "$PROD_HOST_KEY" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PROD_SSH_USER@$PROD_HOST "
        docker pull $DOCKER_IMAGE &&
        docker stop dataplatform || true &&
        docker rm   dataplatform || true &&
        docker run -d --name dataplatform --restart unless-stopped \
          -p 8000:8000 \
          -e DATAPLATFORM_USERNAME=\$DATAPLATFORM_USERNAME \
          -e DATAPLATFORM_PASSWORD=\$DATAPLATFORM_PASSWORD \
          -e DATAPLATFORM_SESSION_SECRET=\$DATAPLATFORM_SESSION_SECRET \
          -v dp_data:/app/data \
          -v dp_logs:/app/logs \
          -v dp_pipelines:/app/pipelines \
          $DOCKER_IMAGE
      "
  environment:
    name: production
    url: http://$PROD_HOST:8000
  when: manual          # requires explicit click in GitLab UI
  only:
    - /^release\/.*/
