<!-- ══ Hallmark · Cobalt · canonical sidebar snippet ══════════════════════

<!-- Mobile toggle script (inline — no external dependency) -->
<script>
(function () {
  var toggle  = document.getElementById('dpSidebarToggle');
  var sidebar = document.getElementById('dpSidebar');
  var overlay = document.getElementById('dpSidebarOverlay');
  if (!toggle || !sidebar || !overlay) return;

  function open() {
    sidebar.classList.add('is-open');
    overlay.classList.add('is-open');
    overlay.removeAttribute('aria-hidden');
    toggle.setAttribute('aria-expanded', 'true');
    toggle.querySelector('i').className = 'fas fa-xmark';
  }

  function close() {
    sidebar.classList.remove('is-open');
    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden', 'true');
    toggle.setAttribute('aria-expanded', 'false');
    toggle.querySelector('i').className = 'fas fa-bars';
  }

  toggle.addEventListener('click', function () {
    sidebar.classList.contains('is-open') ? close() : open();
  });

  overlay.addEventListener('click', close);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && sidebar.classList.contains('is-open')) close();
  });
}());
</script>
