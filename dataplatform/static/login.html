<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Data Platform Suite</title>
    <link rel="stylesheet" href="/static/tokens.css">
    <link rel="stylesheet" href="/static/sidebar.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            min-height: 100%;
            font-family: var(--font-body);
            overflow-x: clip;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: var(--space-4);
            background:
                radial-gradient(circle at 14% 10%, oklch(62% 0.220 35 / 0.22), transparent 32%),
                radial-gradient(circle at 86% 88%, oklch(60% 0.140 185 / 0.12), transparent 34%),
                linear-gradient(135deg, oklch(19% 0.045 34) 0%, oklch(16% 0.034 250) 58%, oklch(13% 0.026 250) 100%);
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0 0 auto 0;
            height: 4px;
            background: linear-gradient(90deg, oklch(65% 0.230 32), oklch(76% 0.160 72), oklch(60% 0.140 185));
            pointer-events: none;
        }

        /* ── Card ────────────────────────────────────────────────── */
        .lc {
            width: 100%;
            max-width: 392px;
            background:
                linear-gradient(180deg, oklch(24% 0.060 38 / 0.82), oklch(16% 0.030 250 / 0.90)),
                oklch(17% 0.030 250 / 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid oklch(36% 0.060 42);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            box-shadow: 0 24px 70px oklch(8% 0.020 250 / 0.38), 0 0 0 1px oklch(80% 0.100 55 / 0.04) inset;
        }

        /* ── Logo ────────────────────────────────────────────────── */
        .lc__logo {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, oklch(65% 0.230 32), oklch(72% 0.160 68));
            margin: 0 auto var(--space-4);
            box-shadow: 0 12px 28px oklch(61% 0.210 38 / 0.30);
        }
        .lc__logo i { color: var(--color-sidebar-text-active); font-size: 1.25rem; }

        .lc__title {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--color-sidebar-text-active);
            text-align: center;
            letter-spacing: -0.01em;
        }
        .lc__sub {
            font-size: var(--text-sm);
            color: var(--color-sidebar-text);
            text-align: center;
            margin-top: var(--space-1);
            margin-bottom: var(--space-6);
        }
        .lc__rule {
            height: 1px;
            background: linear-gradient(90deg, transparent, oklch(58% 0.090 48 / 0.48), transparent);
            margin-bottom: var(--space-6);
        }

        /* ── Form ────────────────────────────────────────────────── */
        label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--color-sidebar-text-active);
            margin-bottom: 6px;
        }
        .lc__field { position: relative; margin-bottom: var(--space-4); }
        .lc__icon {
            position: absolute;
            inset-y: 0;
            left: 0;
            display: flex;
            align-items: center;
            padding-left: var(--space-3);
            pointer-events: none;
            color: var(--color-sidebar-text);
            font-size: var(--text-sm);
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: oklch(13% 0.026 250 / 0.86);
            border: 1px solid oklch(34% 0.060 42);
            border-radius: var(--radius-md);
            padding: 10px var(--space-4) 10px 2.5rem;
            font-family: var(--font-body);
            font-size: var(--text-sm);
            color: var(--color-sidebar-text-active);
            outline: none;
            transition: border-color var(--dur-base) var(--ease-out),
                        box-shadow    var(--dur-base) var(--ease-out);
        }
        input::placeholder { color: var(--color-sidebar-group-label); }
        input:focus {
            border-color: var(--color-sidebar-item-active);
            box-shadow: 0 0 0 3px oklch(61% 0.210 38 / 0.20), 0 8px 22px oklch(8% 0.020 250 / 0.20);
        }

        /* ── Error ───────────────────────────────────────────────── */
        .lc__error {
            display: none;
            align-items: flex-start;
            gap: var(--space-2);
            background: oklch(22% 0.04 25);
            border: 1px solid oklch(54% 0.22 25 / 0.45);
            border-radius: var(--radius-md);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-4);
        }
        .lc__error i { color: var(--color-danger); font-size: var(--text-sm); margin-top: 2px; flex-shrink: 0; }
        .lc__error p { font-size: var(--text-sm); color: oklch(80% 0.12 25); line-height: 1.4; }

        /* ── Button ──────────────────────────────────────────────── */
        .lc__btn {
            width: 100%;
            background: linear-gradient(135deg, oklch(61% 0.210 38), oklch(70% 0.160 66));
            color: var(--color-sidebar-text-active);
            border: none;
            border-radius: var(--radius-md);
            padding: 11px var(--space-4);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-2);
            transition: opacity var(--dur-base) var(--ease-out),
                        transform  var(--dur-fast) var(--ease-out);
            margin-top: var(--space-2);
            box-shadow: 0 10px 24px oklch(61% 0.210 38 / 0.28);
        }
        .lc__btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
        .lc__btn:active:not(:disabled) { transform: translateY(0); }
        .lc__btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── Footer ──────────────────────────────────────────────── */
        .lc__foot {
            margin-top: var(--space-6);
            font-size: var(--text-xs);
            color: var(--color-sidebar-group-label);
            text-align: center;
            line-height: 1.65;
        }
        .lc__foot code {
            background: oklch(25% 0.055 38);
            color: var(--color-sidebar-text);
            padding: 1px 5px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>

<div class="lc">

    <div class="lc__logo" aria-hidden="true">
        <i class="fas fa-layer-group"></i>
    </div>
    <h1 class="lc__title">Data Platform Suite</h1>
    <p class="lc__sub">Sign in to access your workspace</p>
    <div class="lc__rule"></div>

    <form id="loginForm" novalidate>

        <label for="username">Username</label>
        <div class="lc__field">
            <span class="lc__icon"><i class="fas fa-user"></i></span>
            <input id="username" type="text" autocomplete="username" placeholder="Enter username" required>
        </div>

        <label for="password">Password</label>
        <div class="lc__field">
            <span class="lc__icon"><i class="fas fa-lock"></i></span>
            <input id="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
        </div>

        <div id="loginError" class="lc__error" role="alert" aria-live="polite">
            <i class="fas fa-circle-xmark" aria-hidden="true"></i>
            <p id="loginErrorText"></p>
        </div>

        <button id="loginButton" type="submit" class="lc__btn">
            <i class="fas fa-right-to-bracket" aria-hidden="true"></i>
            Sign In
        </button>

    </form>

    <p class="lc__foot">
        Set credentials via
        <code>DATAPLATFORM_USERNAME</code>,
        <code>DATAPLATFORM_PASSWORD</code>, and
        <code>DATAPLATFORM_SESSION_SECRET</code>
        environment variables.
    </p>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username  = document.getElementById('username').value.trim();
        const password  = document.getElementById('password').value;
        const btn       = document.getElementById('loginButton');
        const errorBox  = document.getElementById('loginError');
        const errorTxt  = document.getElementById('loginErrorText');

        errorBox.style.display = 'none';
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Signing In…';

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Invalid credentials. Please try again.');
            window.location.href = '/';
        } catch (err) {
            errorTxt.textContent = err.message || 'Login failed. Please try again.';
            errorBox.style.display = 'flex';
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-right-to-bracket" aria-hidden="true"></i> Sign In';
        }
    });
</script>
</body>
</html>
