<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DP Flow Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(56,189,248,0.18),_transparent_28%),linear-gradient(180deg,_#0f172a_0%,_#111827_100%)] flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="rounded-3xl border border-white/10 bg-white/10 backdrop-blur-xl shadow-2xl p-8 text-white">
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-cyan-400/20 text-cyan-300">
                    <i class="fas fa-shield-halved text-2xl"></i>
                </div>
                <h1 class="mt-5 text-3xl font-bold">DP Flow Login</h1>
                <p class="mt-3 text-slate-300">Sign in to access the landing page, DP Flow, and Pipeline Generator.</p>
            </div>

            <form id="loginForm" class="mt-8 space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-200 mb-2">Username</label>
                    <input id="username" type="text" autocomplete="username" class="w-full rounded-xl border border-white/15 bg-slate-950/40 px-4 py-3 text-white outline-none focus:border-cyan-400" placeholder="Enter username" required>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-200 mb-2">Password</label>
                    <input id="password" type="password" autocomplete="current-password" class="w-full rounded-xl border border-white/15 bg-slate-950/40 px-4 py-3 text-white outline-none focus:border-cyan-400" placeholder="Enter password" required>
                </div>

                <div id="loginError" class="hidden rounded-xl border border-red-400/30 bg-red-500/10 px-4 py-3 text-sm text-red-200"></div>

                <button id="loginButton" type="submit" class="w-full rounded-xl bg-cyan-400 px-4 py-3 font-semibold text-slate-950 hover:bg-cyan-300">
                    <i class="fas fa-right-to-bracket mr-2"></i>Sign In
                </button>
            </form>

            <p class="mt-6 text-xs text-slate-400 leading-6">
                Configure credentials with `DATAPLATFORM_USERNAME`, `DATAPLATFORM_PASSWORD`, and `DATAPLATFORM_SESSION_SECRET`.
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const button = document.getElementById('loginButton');
            const errorBox = document.getElementById('loginError');

            errorBox.classList.add('hidden');
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Signing In';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Login failed');
                }

                window.location.href = '/';
            } catch (error) {
                errorBox.textContent = error.message || 'Login failed';
                errorBox.classList.remove('hidden');
            } finally {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-right-to-bracket mr-2"></i>Sign In';
            }
        });
    </script>
</body>
</html>
