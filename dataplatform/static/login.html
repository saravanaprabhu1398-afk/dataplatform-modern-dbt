<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Data Platform Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-[radial-gradient(ellipse_at_top_left,rgba(99,102,241,0.15),transparent_40%),radial-gradient(ellipse_at_bottom_right,rgba(16,185,129,0.1),transparent_40%),linear-gradient(180deg,#0f172a_0%,#111827_100%)] flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <div class="rounded-2xl border border-white/10 bg-white/[0.08] backdrop-blur-xl shadow-2xl p-8 text-white">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-indigo-500 mb-5 shadow-lg">
                    <i class="fas fa-layer-group text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Data Platform Suite</h1>
                <p class="mt-2 text-sm text-slate-400">Sign in to access your data platform workspace.</p>
            </div>

            <!-- Form -->
            <form id="loginForm" class="space-y-4" novalidate>

                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                            <i class="fas fa-user text-slate-500 text-sm"></i>
                        </span>
                        <input
                            id="username"
                            type="text"
                            autocomplete="username"
                            placeholder="Enter username"
                            required
                            class="w-full rounded-lg border border-white/15 bg-slate-950/40 pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400/30 transition"
                        >
                    </div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                            <i class="fas fa-lock text-slate-500 text-sm"></i>
                        </span>
                        <input
                            id="password"
                            type="password"
                            autocomplete="current-password"
                            placeholder="Enter password"
                            required
                            class="w-full rounded-lg border border-white/15 bg-slate-950/40 pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-500 outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400/30 transition"
                        >
                    </div>
                </div>

                <!-- Error box -->
                <div id="loginError" class="hidden rounded-lg border border-red-500/30 bg-red-500/10 px-4 py-3 flex items-start gap-2.5">
                    <i class="fas fa-circle-xmark text-red-400 text-sm mt-0.5 shrink-0"></i>
                    <p id="loginErrorText" class="text-sm text-red-300 leading-snug"></p>
                </div>

                <!-- Submit -->
                <button
                    id="loginButton"
                    type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg px-4 py-2.5 text-sm font-semibold transition-colors flex items-center justify-center gap-2 mt-2"
                >
                    <i class="fas fa-right-to-bracket"></i>
                    Sign In
                </button>

            </form>

            <!-- Footer note -->
            <p class="mt-6 text-[11px] text-slate-500 leading-relaxed text-center">
                Set credentials via <code class="bg-white/5 px-1 py-0.5 rounded text-slate-400">DATAPLATFORM_USERNAME</code>,
                <code class="bg-white/5 px-1 py-0.5 rounded text-slate-400">DATAPLATFORM_PASSWORD</code>, and
                <code class="bg-white/5 px-1 py-0.5 rounded text-slate-400">DATAPLATFORM_SESSION_SECRET</code>
                environment variables.
            </p>

        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const button   = document.getElementById('loginButton');
            const errorBox = document.getElementById('loginError');
            const errorTxt = document.getElementById('loginErrorText');

            errorBox.classList.add('hidden');
            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In…';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Invalid credentials. Please try again.');
                }

                window.location.href = '/';

            } catch (error) {
                errorTxt.textContent = error.message || 'Login failed. Please try again.';
                errorBox.classList.remove('hidden');
            } finally {
                button.disabled = false;
                button.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In';
            }
        });
    </script>
</body>
</html>
