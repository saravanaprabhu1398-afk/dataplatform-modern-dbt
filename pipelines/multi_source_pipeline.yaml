pipeline_name: Multi-Source Data Integration Pipeline
description: |
  Advanced data integration pipeline demonstrating multiple plugins:
  - API data ingestion
  - File operations
  - Data quality validation
  - Multi-destination loading (Snowflake, PostgreSQL)
  - Email notifications

schedule:
  minute: "0"
  hour: "9"
  day: "*"
  month: "*"
  day_of_week: "*"

tasks:
  - name: Fetch API Data
    id: fetch_api_data
    type: executor
    plugin: api
    config:
      method: GET
      url: https://api.example.com/data
      headers:
        Authorization: Bearer token123
      params:
        limit: 1000
    retries: 3
    timeout: 60

  - name: Save Raw Data
    id: save_raw_data
    type: executor
    plugin: file
    config:
      operation: create
      file_path: data/raw_data.json
      content: "{{ fetch_api_data.data }}"
    depends_on:
      - fetch_api_data

  - name: Validate Data
    id: validate_data
    type: executor
    plugin: duckdb
    config:
      operation: validate
      sql: "SELECT * FROM 'data/raw_data.json'"
      rules:
        - field: id
          type: not_null
        - field: amount
          type: positive
    depends_on:
      - save_raw_data

  - name: Transform Data
    id: transform_data
    type: executor
    plugin: python
    config:
      operation: execute_code
      code: |
        import json
        import pandas as pd
        
        # Load raw data
        with open('data/raw_data.json', 'r') as f:
            data = json.load(f)
        
        # Transform to DataFrame
        df = pd.DataFrame(data)
        df['processed_date'] = pd.Timestamp.now()
        df['amount'] = df['amount'].astype(float)
        
        # Save transformed
        df.to_csv('data/transformed_data.csv', index=False)
        print(f"Transformed {len(df)} records")
      imports:
        - json
        - pandas
    depends_on:
      - validate_data

  - name: Load to Snowflake
    id: load_to_snowflake
    type: executor
    plugin: snowflake
    config:
      operation: load
      table_name: raw_data_staging
      data: "{{ transform_data.output }}"
    depends_on:
      - transform_data

  - name: Load to PostgreSQL
    id: load_to_postgres
    type: executor
    plugin: postgres
    config:
      operation: load
      connection:
        host: localhost
        port: 5432
        database: data_warehouse
        user: postgres
        password: password
      table_name: raw_data_staging
      file_path: data/transformed_data.csv
      columns: ["id", "name", "amount", "processed_date"]
    depends_on:
      - transform_data

  - name: Run Quality Checks
    id: run_quality_checks
    type: executor
    plugin: shell
    config:
      command: |
        echo "Running data quality checks..."
        python scripts/quality_checks.py \
          --input data/transformed_data.csv \
          --output reports/quality_report.json
      shell: bash
    depends_on:
      - load_to_snowflake

  - name: Send Completion Email
    id: send_completion_email
    type: executor
    plugin: email
    config:
      smtp_server: smtp.gmail.com
      smtp_port: 587
      sender_email: pipeline@example.com
      sender_password: app_password
      recipients:
        - data_team@example.com
      subject: "Pipeline Execution Complete"
      body: |
        Data integration pipeline completed successfully!
        
        Summary:
        - API records fetched: {{ fetch_api_data.record_count }}
        - Records transformed: {{ transform_data.record_count }}
        - Loaded to Snowflake: {{ load_to_snowflake.affected_rows }}
        - Loaded to PostgreSQL: {{ load_to_postgres.rows_inserted }}
        
        Quality Report: reports/quality_report.json
    depends_on:
      - run_quality_checks

# Error handling and notifications
error_handlers:
  - trigger: task_failure
    executor: email
    config:
      subject: "Pipeline Failed"
      body: "Task {{ failed_task }} failed with error: {{ error_message }}"
